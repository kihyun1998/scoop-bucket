name: auto-update

# 각 도구의 최신 릴리스를 폴링해 매니페스트를 자동 갱신한다.
# 공개 릴리스 데이터만 읽고(인증 불필요) 이 레포 자신의 토큰으로 커밋하므로 PAT가 필요 없다.
on:
  schedule:
    - cron: "0 * * * *" # 매시 정각
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update jtic manifest
        run: |
          set -euo pipefail
          # 다른(공개) 레포의 릴리스는 인증 없는 공개 API로 읽는다.
          # Actions 기본 토큰은 자기 레포에만 스코프돼 cross-repo 호출은 404가 난다.
          latest=$(curl -fsSL https://api.github.com/repos/kihyun1998/just-tic/releases/latest | jq -r .tag_name)
          v="${latest#v}"
          cur=$(jq -r .version bucket/jtic.json)
          if [ "$v" = "$cur" ]; then
            echo "이미 최신 ($cur) — 변경 없음"
            exit 0
          fi
          echo "갱신: $cur -> $v"
          url="https://github.com/kihyun1998/just-tic/releases/download/v$v/jtic-v$v-x86_64-pc-windows-msvc.zip"
          tmp=$(mktemp)
          curl -sSL "$url" -o "$tmp"
          hash=$(sha256sum "$tmp" | cut -d' ' -f1)
          jq --arg v "$v" --arg url "$url" --arg hash "$hash" --arg ed "jtic-v$v-x86_64-pc-windows-msvc" '
              .version = $v
            | .architecture["64bit"].url = $url
            | .architecture["64bit"].hash = $hash
            | .architecture["64bit"].extract_dir = $ed
          ' bucket/jtic.json > bucket/jtic.json.tmp
          mv bucket/jtic.json.tmp bucket/jtic.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "jtic $v 자동 업데이트"
          git push

      - name: Update just-shield manifest
        run: |
          set -euo pipefail
          latest=$(curl -fsSL https://api.github.com/repos/kihyun1998/just-shield/releases/latest | jq -r .tag_name)
          v="${latest#v}"
          cur=$(jq -r .version bucket/just-shield.json)
          if [ "$v" = "$cur" ]; then
            echo "이미 최신 ($cur) — 변경 없음"
            exit 0
          fi
          echo "갱신: $cur -> $v"
          base="https://github.com/kihyun1998/just-shield/releases/download/v$v"
          # 해시는 바이너리를 다시 받아 계산하지 않고 릴리스의 SHA256SUMS에서 읽는다
          # — 릴리스 워크플로가 출처 증명(attestation)을 발급한 바로 그 파일이다.
          curl -fsSL "$base/SHA256SUMS" -o sums.txt
          sha() { awk -v f="$1" '$2 == f {print $1}' sums.txt; }
          h64=$(sha "just-shield-v$v-x86_64-pc-windows-msvc.zip")
          harm=$(sha "just-shield-v$v-aarch64-pc-windows-msvc.zip")
          if [ -z "$h64" ] || [ -z "$harm" ]; then
            echo "SHA256SUMS에 항목이 없습니다 — 릴리스가 불완전할 수 있어 갱신을 중단합니다" >&2
            exit 1
          fi
          rm sums.txt
          jq --arg v "$v" --arg base "$base" --arg h64 "$h64" --arg harm "$harm" '
              .version = $v
            | .architecture["64bit"].url = "\($base)/just-shield-v\($v)-x86_64-pc-windows-msvc.zip"
            | .architecture["64bit"].hash = $h64
            | .architecture["64bit"].extract_dir = "just-shield-v\($v)-x86_64-pc-windows-msvc"
            | .architecture["arm64"].url = "\($base)/just-shield-v\($v)-aarch64-pc-windows-msvc.zip"
            | .architecture["arm64"].hash = $harm
            | .architecture["arm64"].extract_dir = "just-shield-v\($v)-aarch64-pc-windows-msvc"
          ' bucket/just-shield.json > bucket/just-shield.json.tmp
          mv bucket/just-shield.json.tmp bucket/just-shield.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "just-shield $v 자동 업데이트"
          git push
